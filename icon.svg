<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0d0f18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b8fff"/>
      <stop offset="100%" stop-color="#6c5fff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="256" cy="220" r="130" fill="none" stroke="url(#accent)" stroke-width="12"/>
  <!-- Globe lines -->
  <ellipse cx="256" cy="220" rx="60" ry="130" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.6"/>
  <line x1="126" y1="220" x2="386" y2="220" stroke="url(#accent)" stroke-width="8" opacity="0.6"/>
  <line x1="140" y1="170" x2="372" y2="170" stroke="url(#accent)" stroke-width="6" opacity="0.4"/>
  <line x1="140" y1="270" x2="372" y2="270" stroke="url(#accent)" stroke-width="6" opacity="0.4"/>
  <!-- Speech bubble -->
  <rect x="175" y="370" width="162" height="52" rx="26" fill="url(#accent)" opacity="0.9"/>
  <polygon points="220,422 240,450 260,422" fill="url(#accent)" opacity="0.9"/>
  <!-- LF text -->
  <text x="256" y="404" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white">LF</text>
</svg>